<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timmy &mdash; Records for value</title>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css"
    />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem auto;
        width: 90%;
      }
      a.back {
        font-size: 0.85rem;
      }
      h1 {
        font-size: 1.3rem;
      }
      h1 code {
        font-size: 1.1rem;
        background: #f3f3f3;
        padding: 0.1rem 0.4rem;
        border-radius: 4px;
      }
      table#records th,
      table#records td {
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    {% include "_nav.html" %}
    <p>
      <a class="back" href="{{ url_for('analysis.values', analysis_id=analysis_id, prefix=path) }}">&larr; Back to values for {{ path }}</a>
      &nbsp;&middot;&nbsp;
      <a class="back" href="{{ url_for('analysis.detail', analysis_id=analysis_id) }}">Analysis</a>
    </p>
    <h1>
      Records where <code>{{ path }}</code> = <code>{{ value }}</code>
    </h1>

    <table id="records" class="display" style="width: 100%">
      <thead>
        <tr>
          {% for col in columns %}
          <th>{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
    </table>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script>
      const PATH = {{ path | tojson }};
      const VALUE = {{ value | tojson }};
      // Base for record links: /record/<id>/<run_id>/<offset> (exact version).
      const RECORD_BASE =
        "{{ url_for('main.records') }}".replace(/records$/, "record/");

      function recordHref(id, runId, offset) {
        return (
          RECORD_BASE +
          encodeURIComponent(id) +
          "/" +
          encodeURIComponent(runId) +
          "/" +
          encodeURIComponent(offset) +
          "?analysis={{ analysis_id }}"
        );
      }

      new DataTable("#records", {
        serverSide: true,
        processing: true,
        ajax: {
          url: "{{ url_for('analysis.value_records_data', analysis_id=analysis_id) }}",
          data: function (d) {
            d.path = PATH;
            d.value = VALUE;
          },
        },
        orderMulti: false,
        order: [[0, "asc"]],
        pageLength: 25,
        lengthMenu: [10, 25, 50, 100],
        columns: [
          {
            data: "timdex_record_id",
            render: function (data, type, row) {
              if (type !== "display" || data === null) return data;
              const a = document.createElement("a");
              a.href = recordHref(data, row.run_id, row.run_record_offset);
              a.textContent = data;
              return a.outerHTML;
            },
          },
          { data: "source" },
          { data: "run_id" },
          { data: "run_record_offset" },
        ],
      });
    </script>
  </body>
</html>
